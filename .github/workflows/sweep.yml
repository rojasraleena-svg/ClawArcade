name: Cifarcade Sweep

on:
  workflow_dispatch:
    inputs:
      experiments:
        description: 'JSON array of hyperparameter sets. Default: auto smart sweep.'
        required: false
        default: 'auto'
      epochs:
        description: 'Max epochs per run (1-80)'
        required: false
        default: '50'
  schedule:
    # Every 4 hours: 0,4,8,12,16,20 UTC
    - cron: '0 */4 * * *'

# Public repo + contents:write → no billing impact, can auto-commit
permissions:
  contents: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd 101-CIFAR
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Generate experiment configs
        id: configs
        run: |
          cd 101-CIFAR
          MAX_EPOCHS=${{ github.event.inputs.epochs || '50' }}

          if [ "${{ github.event.inputs.experiments }}" != "auto" ] && [ "${{ github.event.inputs.experiments }}" != "" ]; then
            echo "${{ github.event.inputs.experiments }}" > /tmp/experiments.json
          else
            python3 -c "
          import json, random

          random.seed(2026)
          epochs = ${MAX_EPOCHS}
          experiments = []

          # ─── Phase 1: Fine-grained lr sweep around sweet spot ───
          # Best so far: lr=0.005, wd=0.0, bs=128, mom=0.9 → 70.21%
          for lr in [0.002, 0.003, 0.004, 0.005, 0.006, 0.007, 0.008, 0.010]:
              experiments.append({'lr': lr, 'weight_decay': 0.0, 'batch_size': 128, 'epochs': epochs, 'momentum': 0.9})

          # ─── Phase 2: weight decay with best lr=0.005 ───
          for wd in [0.0, 1e-5, 5e-5, 1e-4, 2e-4, 5e-4]:
              experiments.append({'lr': 0.005, 'weight_decay': wd, 'batch_size': 128, 'epochs': epochs, 'momentum': 0.9})

          # ─── Phase 3: batch size with lr=0.005 ───
          for bs in [32, 64, 128, 256]:
              experiments.append({'lr': 0.005, 'weight_decay': 0.0, 'batch_size': bs, 'epochs': epochs, 'momentum': 0.9})

          # ─── Phase 4: momentum with lr=0.005 ───
          for mom in [0.85, 0.88, 0.90, 0.92, 0.95]:
              experiments.append({'lr': 0.005, 'weight_decay': 0.0, 'batch_size': 128, 'epochs': epochs, 'momentum': mom})

          # ─── Phase 5: more epochs for top configs ───
          for cfg in [
              {'lr': 0.005, 'weight_decay': 0.0,  'batch_size': 128, 'momentum': 0.9},   # best
              {'lr': 0.005, 'weight_decay': 1e-4, 'batch_size': 128, 'momentum': 0.9},   # 2nd best region
              {'lr': 0.01,  'weight_decay': 1e-4, 'batch_size': 128, 'momentum': 0.9},   # previous 2nd
              {'lr': 0.003, 'weight_decay': 0.0,  'batch_size': 128, 'momentum': 0.9},   # explore low lr
              {'lr': 0.007, 'weight_decay': 0.0,  'batch_size': 128, 'momentum': 0.9},   # explore mid lr
              {'lr': 0.005, 'weight_decay': 0.0,  'batch_size': 64,  'momentum': 0.9},   # smaller batch
              {'lr': 0.005, 'weight_decay': 0.0,  'batch_size': 256, 'momentum': 0.9},   # larger batch
          ]:
              cfg['epochs'] = 60  # longer training for promising configs
              experiments.append(cfg)

          # ─── Phase 6: focused random exploration in narrowed region ───
          for _ in range(6):
              experiments.append({
                  'lr': round(random.uniform(0.002, 0.01), 4),
                  'weight_decay': round(random.choice([0.0, 1e-5, 5e-5, 1e-4, 2e-4]), 5),
                  'batch_size': random.choice([64, 128, 256]),
                  'epochs': epochs,
                  'momentum': round(random.uniform(0.85, 0.95), 2),
              })

          with open('/tmp/experiments.json', 'w') as f:
              json.dump(experiments, f, indent=2)
          print(f'Generated {len(experiments)} experiments')
          "
          fi

      - name: Run experiments
        run: |
          cd 101-CIFAR
          echo "=== CIFAR-10 Cifarcade Sweep ==="
          echo "Date: $(date -u)"
          echo ""

          RESULTS="/tmp/results.csv"
          echo "run,lr,weight_decay,batch_size,epochs,momentum,best_acc,final_acc,status" > "$RESULTS"

          python3 -c "
          import json, subprocess, sys

          with open('/tmp/experiments.json') as f:
              experiments = json.load(f)

          results = []
          for i, cfg in enumerate(experiments):
              run_id = i + 1
              cmd = [
                  'python3', 'train.py',
                  '--lr', str(cfg['lr']),
                  '--weight-decay', str(cfg['weight_decay']),
                  '--batch-size', str(cfg['batch_size']),
                  '--epochs', str(cfg['epochs']),
                  '--momentum', str(cfg['momentum']),
              ]
              print(f'--- Run {run_id}/{len(experiments)}: lr={cfg[\"lr\"]} wd={cfg[\"weight_decay\"]} bs={cfg[\"batch_size\"]} mom={cfg[\"momentum\"]} ---')

              result = subprocess.run(cmd, capture_output=True, text=True, timeout=600)

              if result.returncode == 0:
                  lines = result.stdout.strip().split('\n')
                  epochs = [int(x) for x in lines[0].split(',')]
                  accs = [float(x) for x in lines[1].split(',')]
                  best_acc = max(accs)
                  final_acc = accs[-1]
                  status = 'ok'
                  print(f'  best={best_acc:.4f} final={final_acc:.4f} (evaluated at {len(accs)} checkpoints)')
              else:
                  best_acc = 0.0
                  final_acc = 0.0
                  status = f'error: {result.stderr[:100]}'
                  print(f'  FAILED: {status}')

              with open('/tmp/results.csv', 'a') as f:
                  f.write(f'{run_id},{cfg[\"lr\"]},{cfg[\"weight_decay\"]},{cfg[\"batch_size\"]},{cfg[\"epochs\"]},{cfg[\"momentum\"]},{best_acc:.4f},{final_acc:.4f},{status}\n')

              sys.stdout.flush()

          print()
          print('=== TOP 10 (sorted by best_acc) ===')
          with open('/tmp/results.csv') as f:
              lines = f.readlines()
          header = lines[0]
          data = sorted(lines[1:], key=lambda x: float(x.split(',')[6]), reverse=True)
          print(header.strip())
          for line in data[:10]:
              print(line.strip())
          "

      - name: Commit results
        run: |
          cd 101-CIFAR
          mkdir -p results
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          cp /tmp/results.csv "results/sweep-${TIMESTAMP}.csv"
          cp /tmp/experiments.json "results/sweep-${TIMESTAMP}.json"

          # Rebuild leaderboard from ALL sweep results
          echo "# 🦞 Cifarcade Leaderboard" > results/LEADERBOARD.md
          echo "" >> results/LEADERBOARD.md
          echo "Auto-generated from sweep experiments. Updated: $(date -u)" >> results/LEADERBOARD.md
          echo "" >> results/LEADERBOARD.md
          echo "| Rank | LR | Weight Decay | Batch Size | Momentum | Epochs | Best Acc | Final Acc | Sweep |" >> results/LEADERBOARD.md
          echo "|------|-----|-------------|-----------|----------|--------|----------|-----------|-------|" >> results/LEADERBOARD.md

          python3 -c "
          import csv, os, glob

          all_rows = []
          for f in sorted(glob.glob('results/sweep-*.csv')):
              sweep_name = os.path.basename(f).replace('.csv','').replace('sweep-','')
              with open(f) as fh:
                  reader = csv.DictReader(fh)
                  for row in reader:
                      row['sweep'] = sweep_name
                      all_rows.append(row)

          all_rows.sort(key=lambda x: float(x['best_acc']), reverse=True)
          seen = set()
          rank = 0
          for row in all_rows[:30]:
              key = (row['lr'], row['weight_decay'], row['batch_size'], row['momentum'])
              if key in seen:
                  continue
              seen.add(key)
              rank += 1
              print(f'| {rank} | {row[\"lr\"]} | {row[\"weight_decay\"]} | {row[\"batch_size\"]} | {row[\"momentum\"]} | {row[\"epochs\"]} | {row[\"best_acc\"]} | {row[\"final_acc\"]} | {row[\"sweep\"]} |')
          " >> results/LEADERBOARD.md

          git config user.name "openclaw-bot"
          git config user.email "openclaw-bot@users.noreply.github.com"
          git add results/
          git commit -m "🦞 sweep ${TIMESTAMP}: auto hyperparameter search results" || echo "No new results to commit"
          git push
