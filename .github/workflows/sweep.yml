name: Cifarcade Sweep

on:
  workflow_dispatch:
    inputs:
      experiments:
        description: 'JSON array of hyperparameter sets. Default: auto smart sweep.'
        required: false
        default: 'auto'
      epochs:
        description: 'Max epochs per run (1-80)'
        required: false
        default: '50'
  schedule:
    # Every 4 hours: 0,4,8,12,16,20 UTC
    - cron: '0 */4 * * *'

# Public repo + contents:write → no billing impact, can auto-commit
permissions:
  contents: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd 101-CIFAR
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Generate experiment configs
        id: configs
        run: |
          cd 101-CIFAR
          MAX_EPOCHS=${{ github.event.inputs.epochs || '50' }}

          if [ "${{ github.event.inputs.experiments }}" != "auto" ] && [ "${{ github.event.inputs.experiments }}" != "" ]; then
            echo "${{ github.event.inputs.experiments }}" > /tmp/experiments.json
          else
            python3 -c "
          import json, random

          random.seed(2026)
          experiments = []

          # ─── Sweep v3: Focused on discovered sweet spot ───
          # Best: lr=0.005, wd=0.0001, bs=128, mom=0.9, epochs=60 → 72.07%
          # 2nd: lr=0.005, wd=0.0, bs=128, mom=0.9 → 71.77% (stable across 4 runs)
          # bs=128 is clearly optimal (32/64/256 all worse)
          # wd=0.0001 > wd=0.0 by +0.3%

          # ─── Phase 1: Fine-grained lr around 0.005 with wd=0.0001 ───
          for lr in [0.0035, 0.0040, 0.0045, 0.0050, 0.0055, 0.0060, 0.0065, 0.0070]:
              experiments.append({'lr': lr, 'weight_decay': 1e-4, 'batch_size': 128, 'epochs': 50, 'momentum': 0.9})

          # ─── Phase 2: wd micro-sweep around 1e-4 with lr=0.005 ───
          for wd in [5e-5, 7.5e-5, 1e-4, 1.5e-4, 2e-4, 3e-4]:
              experiments.append({'lr': 0.005, 'weight_decay': wd, 'batch_size': 128, 'epochs': 50, 'momentum': 0.9})

          # ─── Phase 3: momentum micro-sweep ───
          for mom in [0.88, 0.89, 0.90, 0.91, 0.92]:
              experiments.append({'lr': 0.005, 'weight_decay': 1e-4, 'batch_size': 128, 'epochs': 50, 'momentum': mom})

          # ─── Phase 4: Extended epochs for top configs (bs=128 only to avoid timeout) ───
          # Best from sweep v3: lr=0.005, wd=5e-05, bs=128, ep=65 → 72.56%
          for cfg in [
              {'lr': 0.005, 'weight_decay': 5e-5, 'batch_size': 128, 'momentum': 0.9},    # ★ 72.56% best!
              {'lr': 0.005, 'weight_decay': 7.5e-5, 'batch_size': 128, 'momentum': 0.9},  # between best wd values
              {'lr': 0.005, 'weight_decay': 1e-4, 'batch_size': 128, 'momentum': 0.9},     # 72.07% solid
              {'lr': 0.0045, 'weight_decay': 5e-5, 'batch_size': 128, 'momentum': 0.9},   # lower lr + lower wd combo
              {'lr': 0.0055, 'weight_decay': 5e-5, 'batch_size': 128, 'momentum': 0.9},   # higher lr + lower wd
              {'lr': 0.005, 'weight_decay': 5e-5, 'batch_size': 128, 'momentum': 0.91},   # best config + higher mom
              {'lr': 0.005, 'weight_decay': 5e-5, 'batch_size': 128, 'momentum': 0.89},   # best config + lower mom
          ]:
              cfg['epochs'] = 60  # safe within 720s timeout
              experiments.append(cfg)

          # ─── Phase 5: Focused random in narrowed region (around new best) ───
          for _ in range(6):
              experiments.append({
                  'lr': round(random.uniform(0.004, 0.006), 4),
                  'weight_decay': round(random.choice([3e-5, 5e-5, 7.5e-5, 1e-4, 1.5e-4]), 5),
                  'batch_size': 128,
                  'epochs': random.choice([50, 55, 60]),
                  'momentum': round(random.uniform(0.88, 0.92), 2),
              })

          with open('/tmp/experiments.json', 'w') as f:
              json.dump(experiments, f, indent=2)
          print(f'Generated {len(experiments)} experiments')
          "
          fi

      - name: Run experiments
        run: |
          cd 101-CIFAR
          echo "=== CIFAR-10 Cifarcade Sweep v3 ==="
          echo "Date: $(date -u)"
          echo ""

          RESULTS="/tmp/results.csv"
          echo "run,lr,weight_decay,batch_size,epochs,momentum,best_acc,final_acc,status" > "$RESULTS"

          python3 -c "
          import json, subprocess, sys

          with open('/tmp/experiments.json') as f:
              experiments = json.load(f)

          results = []
          for i, cfg in enumerate(experiments):
              run_id = i + 1
              cmd = [
                  'python3', 'train.py',
                  '--lr', str(cfg['lr']),
                  '--weight-decay', str(cfg['weight_decay']),
                  '--batch-size', str(cfg['batch_size']),
                  '--epochs', str(cfg['epochs']),
                  '--momentum', str(cfg['momentum']),
              ]
              print(f'--- Run {run_id}/{len(experiments)}: lr={cfg[\"lr\"]} wd={cfg[\"weight_decay\"]} bs={cfg[\"batch_size\"]} ep={cfg[\"epochs\"]} mom={cfg[\"momentum\"]} ---')

              result = subprocess.run(cmd, capture_output=True, text=True, timeout=720)

              if result.returncode == 0:
                  lines = result.stdout.strip().split('\n')
                  epochs = [int(x) for x in lines[0].split(',')]
                  accs = [float(x) for x in lines[1].split(',')]
                  best_acc = max(accs)
                  final_acc = accs[-1]
                  status = 'ok'
                  print(f'  best={best_acc:.4f} final={final_acc:.4f} (evaluated at {len(accs)} checkpoints)')
              else:
                  best_acc = 0.0
                  final_acc = 0.0
                  status = f'error: {result.stderr[:100]}'
                  print(f'  FAILED: {status}')

              with open('/tmp/results.csv', 'a') as f:
                  f.write(f'{run_id},{cfg[\"lr\"]},{cfg[\"weight_decay\"]},{cfg[\"batch_size\"]},{cfg[\"epochs\"]},{cfg[\"momentum\"]},{best_acc:.4f},{final_acc:.4f},{status}\n')

              sys.stdout.flush()

          print()
          print('=== TOP 10 (sorted by best_acc) ===')
          with open('/tmp/results.csv') as f:
              lines = f.readlines()
          header = lines[0]
          data = sorted(lines[1:], key=lambda x: float(x.split(',')[6]), reverse=True)
          print(header.strip())
          for line in data[:10]:
              print(line.strip())
          "

      - name: Commit results
        run: |
          cd 101-CIFAR
          mkdir -p results
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          cp /tmp/results.csv "results/sweep-${TIMESTAMP}.csv"
          cp /tmp/experiments.json "results/sweep-${TIMESTAMP}.json"

          # Rebuild leaderboard from ALL sweep results
          echo "# 🦞 Cifarcade Leaderboard" > results/LEADERBOARD.md
          echo "" >> results/LEADERBOARD.md
          echo "Auto-generated from sweep experiments. Updated: $(date -u)" >> results/LEADERBOARD.md
          echo "" >> results/LEADERBOARD.md
          echo "| Rank | LR | Weight Decay | Batch Size | Momentum | Epochs | Best Acc | Final Acc | Sweep |" >> results/LEADERBOARD.md
          echo "|------|-----|-------------|-----------|----------|--------|----------|-----------|-------|" >> results/LEADERBOARD.md

          python3 -c "
          import csv, os, glob

          all_rows = []
          for f in sorted(glob.glob('results/sweep-*.csv')):
              sweep_name = os.path.basename(f).replace('.csv','').replace('sweep-','')
              with open(f) as fh:
                  reader = csv.DictReader(fh)
                  for row in reader:
                      row['sweep'] = sweep_name
                      all_rows.append(row)

          all_rows.sort(key=lambda x: float(x['best_acc']), reverse=True)
          seen = set()
          rank = 0
          for row in all_rows[:30]:
              key = (row['lr'], row['weight_decay'], row['batch_size'], row['momentum'])
              if key in seen:
                  continue
              seen.add(key)
              rank += 1
              print(f'| {rank} | {row[\"lr\"]} | {row[\"weight_decay\"]} | {row[\"batch_size\"]} | {row[\"momentum\"]} | {row[\"epochs\"]} | {row[\"best_acc\"]} | {row[\"final_acc\"]} | {row[\"sweep\"]} |')
          " >> results/LEADERBOARD.md

          git config user.name "openclaw-bot"
          git config user.email "openclaw-bot@users.noreply.github.com"

          # Pull latest first to avoid rebase conflicts from concurrent runs
          git pull --no-rebase --no-edit 2>/dev/null || true

          # Stage only new result files (avoid conflicts on existing files)
          git add results/sweep-${TIMESTAMP}.csv results/sweep-${TIMESTAMP}.json results/LEADERBOARD.md
          git commit -m "🦞 sweep ${TIMESTAMP}: v3 focused sweet-spot search" || echo "No new results to commit"

          # Push with retry for concurrent runs
          for attempt in 1 2 3; do
            git pull --no-rebase --no-edit 2>/dev/null || true
            if git push; then
              break
            fi
            echo "Push attempt $attempt failed, retrying in 5s..."
            sleep 5
          done
